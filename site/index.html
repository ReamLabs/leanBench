<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>lean-bench · performance across hardware</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='75' text-anchor='middle' font-size='85'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E">
</head>
<body>
  <header>
    <div class="container">
      <h1>lean-bench</h1>
      <p class="tagline">leanSig &amp; leanMultisig performance across hardware</p>
    </div>
  </header>

  <main class="container">
    <section id="filter">
      <details class="combo-filter" id="combo-filter">
        <summary>
          <span class="combo-label">loading…</span>
          <span class="combo-chevron" aria-hidden="true">▾</span>
        </summary>
        <div class="combo-menu" id="combo-menu"></div>
      </details>
    </section>

    <section id="overview">
      <div class="stat-row">
        <div class="stat"><div class="stat-value" id="stat-runs">—</div><div class="stat-label">runs</div></div>
        <div class="stat"><div class="stat-value" id="stat-machines">—</div><div class="stat-label">machines</div></div>
        <div class="stat"><div class="stat-value" id="stat-generated">—</div><div class="stat-label">last updated</div></div>
      </div>
    </section>

    <section id="compare">
      <h2>Across machines</h2>
      <div id="compare-grid"></div>
    </section>

    <section id="machines">
      <h2>Machines</h2>
      <div id="machine-list"></div>
    </section>
  </main>

  <footer>
    <div class="container">
      <a href="https://github.com/leanEthereum/lean-bench">source</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
