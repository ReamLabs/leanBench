# Build leanMultisig (and its KoalaBear backend) with the same SIMD target
# features it expects on the host. Without this, deps fall to the
# `type Packing = Self` no-SIMD arm and hit a w=0 corner case in the GKR
# sumcheck (sub_protocols/src/quotient_gkr/sumcheck_utils.rs panics on
# slice OOB). leanMultisig's own .cargo/config.toml sets the same flag,
# but that config is workspace-local — Cargo does not read it for crates
# pulled as git dependencies, which is how lean-bench consumes it.
#
# Tradeoff: binaries built here are not portable across CPU generations
# (an AVX-512 build will SIGILL on AVX2-only hardware). That's fine for
# this tool — we always run the benchmark on the same machine that
# built the binary. Don't ship `runner-rust/target/release/...` to other
# machines.

[build]
rustflags = ["-C", "target-cpu=native"]
